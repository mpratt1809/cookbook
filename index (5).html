<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Cookbook — PrattHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf5ec;--bg2:#f3ebe0;--bg3:#efe5d6;
  --card:#fff;--border:#e8dcc8;--border2:#e0d5c3;--border3:#d4c5ae;
  --brown:#5c3d2e;--brown-dark:#3d2518;--brown-light:#6b5744;
  --tan:#8b7355;--gold:#c9a96e;--gold-bg:rgba(201,169,110,0.15);
  --cream:#fdfaf5;--danger:#b54a32;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Source Sans 3','Segoe UI',sans-serif;
}
body{font-family:var(--sans);background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%);color:#2a2118;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(201,169,110,0.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.header{background:linear-gradient(135deg,var(--brown) 0%,var(--brown-dark) 100%);padding:24px 28px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(60,30,15,0.2)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:44px;height:44px;border-radius:12px;background:rgba(201,169,110,0.25);display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(201,169,110,0.4);font-size:22px}
.header h1{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--bg);letter-spacing:-0.3px}
.header .sub{font-size:13px;color:rgba(250,245,236,0.6);margin-top:2px}
.back-link{color:rgba(250,245,236,0.7);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px;transition:color 0.2s}
.back-link:hover{color:var(--bg)}

/* Buttons */
.btn{border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;gap:8px;transition:all 0.2s}
.btn-primary{background:var(--brown);color:var(--bg)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(92,61,46,0.3)}
.btn-secondary{background:var(--card);color:var(--brown);border:1.5px solid var(--border3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-icon{background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:6px;transition:background 0.15s;color:var(--brown);font-size:14px;font-weight:500;font-family:var(--sans)}
.btn-icon:hover{background:var(--gold-bg)}
.btn-icon.danger{color:var(--danger)}

/* Controls */
.controls{max-width:1100px;margin:0 auto;padding:24px 28px 0}
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px 16px;border:1.5px solid var(--border2);box-shadow:0 2px 8px rgba(90,60,30,0.06)}
.search-wrap input{flex:1;border:none;background:transparent;font-size:15px;color:#2a2118;font-family:var(--sans);outline:none}
.cat-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.cat-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border3);background:var(--card);color:var(--brown);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.cat-btn:hover,.cat-btn.active{background:var(--brown);color:var(--bg);border-color:var(--brown)}

/* Grid */
.grid{max-width:1100px;margin:0 auto;padding:24px 28px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:all 0.3s;box-shadow:0 2px 10px rgba(90,60,30,0.06);cursor:pointer;animation:fadeIn 0.4s ease both}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(90,60,30,0.15)}
.card-img{height:170px;overflow:hidden;background:var(--bg2)}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img-placeholder{height:170px;background:linear-gradient(135deg,var(--bg2),var(--border));display:flex;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:16px 18px 18px}
.card-cat{font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.8px}
.card-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--brown-dark);margin-top:6px;line-height:1.3}
.card-desc{font-size:13px;color:var(--tan);margin-top:6px;line-height:1.5}
.card-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:12px;color:var(--tan);align-items:center}
.added-by-tag{background:var(--gold-bg);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#8b6b30}

/* Detail */
.detail-wrap{max-width:900px;margin:0 auto;padding:20px 28px 40px;animation:slideIn 0.3s ease both}
.detail-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.detail-cat{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.detail-title{font-family:var(--serif);font-size:34px;font-weight:800;color:var(--brown-dark);margin-top:8px;line-height:1.15}
.detail-desc{font-size:16px;color:var(--brown-light);font-style:italic;margin-top:10px;line-height:1.6}
.detail-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.meta-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card);border-radius:20px;font-size:13px;color:var(--brown);border:1px solid var(--border2);font-weight:500}
.detail-columns{display:grid;grid-template-columns:1fr 1.5fr;gap:32px;margin:28px 0 24px}
@media(max-width:700px){.detail-columns{grid-template-columns:1fr}}
.ingredient-panel{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border)}
.section-title{font-family:var(--serif);font-size:20px;color:var(--brown);margin-bottom:16px}
.ing-row{display:flex;gap:12px;font-size:15px;padding:6px 0;border-bottom:1px dashed var(--bg3)}
.ing-amount{font-weight:600;color:var(--brown);min-width:80px;text-align:right}
.steps-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:16px}
.step-item{display:flex;gap:14px;font-size:15px;line-height:1.65;color:var(--brown-dark)}
.step-num{min-width:30px;height:30px;border-radius:50%;background:var(--brown);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.notes-box{background:linear-gradient(135deg,var(--bg),#f6eedd);padding:20px;border-radius:12px;border-left:4px solid var(--gold);font-size:15px;color:var(--brown-light);line-height:1.6;margin-bottom:24px}

/* Photos */
.photo-upload-box{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.photo-card{border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--border);box-shadow:0 2px 8px rgba(90,60,30,0.06);transition:transform 0.2s}
.photo-card:hover{transform:scale(1.03)}
.photo-card img{width:100%;height:180px;object-fit:cover}
.photo-caption{padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.photo-caption .cap{font-size:13px;color:var(--brown);font-weight:500}
.photo-caption .date{font-size:12px;color:var(--tan)}
.photo-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* Form */
.form-wrap{max-width:800px;margin:0 auto;padding:20px 28px 40px;animation:slideIn 0.3s ease both}
.form-body{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border)}
.form-group{margin-bottom:20px}
.form-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.form-row .form-group{flex:1;min-width:140px;margin-bottom:0}
label.label{display:block;font-size:13px;font-weight:600;color:var(--brown);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.input,.select,.textarea{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border2);font-size:15px;color:#2a2118;font-family:var(--sans);background:var(--cream);transition:border-color 0.2s,box-shadow 0.2s}
.textarea{resize:vertical}
.ing-form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.ing-form-row .input:first-child{width:70px;flex:none}
.ing-form-row .select{width:80px;flex:none}
.ing-form-row .input:last-of-type{flex:1}
.step-form-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.step-form-num{min-width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--brown);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:10px}
.add-row-btn{background:none;border:1.5px dashed var(--gold);border-radius:10px;padding:8px 16px;font-size:13px;color:var(--brown);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;margin-top:4px;font-family:var(--sans)}
.remove-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--danger);font-size:18px;line-height:1}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(60,30,15,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card);border-radius:16px;padding:28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(60,30,15,0.25)}
.modal h3{font-family:var(--serif);color:var(--brown);margin-bottom:8px}
.modal p{color:var(--brown-light);font-size:15px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* Empty */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px}
.empty-state h3{font-family:var(--serif);font-size:20px;color:var(--brown);margin-top:16px}
.empty-state p{color:var(--tan);font-size:15px;margin-top:4px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--brown-dark);color:var(--bg);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:2000;box-shadow:0 8px 24px rgba(60,30,15,0.3);animation:toastIn 0.3s ease}

/* Responsive */
@media(max-width:600px){
  .header h1{font-size:20px}
  .grid{grid-template-columns:1fr;padding:16px}
  .controls{padding:16px}
  .detail-title{font-size:26px}
  .form-body{padding:20px}
  .detail-wrap,.form-wrap{padding:12px 16px 32px}
  .header{padding:16px}
}

/* Print styling */
@media print{
  .header,.controls,.detail-topbar,.photos-section,.no-print{display:none!important}
  .detail-wrap{padding:0;max-width:100%}
  .detail-columns{grid-template-columns:1fr 1fr}
  body{background:#fff}
}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = ["All Recipes","Grandma's Classics","Holiday Favorites","Weeknight Dinners","Desserts & Sweets","Breakfast & Brunch","Sides & Salads","Family Originals"];
const UNITS = ["","tsp","tbsp","cup","oz","lb","g","kg","ml","L","pinch","dash","whole","slice","clove","can","bunch","pkg"];
const FAMILY_MEMBERS = ["Sky","Meagan","Grandma","Grandpa","Mom","Dad","Custom"];

const SAMPLE_RECIPES = [{
  id:"sample-1",title:"Grandma's Chocolate Chip Cookies",category:"Grandma's Classics",
  description:"The recipe that started it all. Crispy edges, chewy centers, and that secret touch of love only Grandma could add.",
  servings:36,prepTime:"15 min",cookTime:"12 min",
  ingredients:[
    {id:"i1",name:"all-purpose flour",amount:"2.25",unit:"cup"},
    {id:"i2",name:"butter, softened",amount:"1",unit:"cup"},
    {id:"i3",name:"granulated sugar",amount:"0.75",unit:"cup"},
    {id:"i4",name:"brown sugar, packed",amount:"0.75",unit:"cup"},
    {id:"i5",name:"eggs",amount:"2",unit:"whole"},
    {id:"i6",name:"vanilla extract",amount:"1",unit:"tsp"},
    {id:"i7",name:"baking soda",amount:"1",unit:"tsp"},
    {id:"i8",name:"salt",amount:"1",unit:"tsp"},
    {id:"i9",name:"chocolate chips",amount:"2",unit:"cup"},
  ],
  steps:[
    "Preheat oven to 375°F. Line baking sheets with parchment paper.",
    "Whisk together flour, baking soda, and salt in a bowl. Set aside.",
    "Beat butter and both sugars until light and fluffy, about 3 minutes.",
    "Beat in eggs one at a time, then add vanilla.",
    "Gradually mix in flour mixture until just combined.",
    "Fold in chocolate chips by hand — Grandma always said the spoon matters.",
    "Drop rounded tablespoons onto baking sheets, spacing 2 inches apart.",
    "Bake 9-12 minutes until golden brown. Let cool on pan for 5 minutes.",
  ],
  notes:"Grandma's secret: chill the dough for 30 minutes before baking for thicker cookies.",
  addedBy:"Grandma",dateAdded:"2024-01-15",photos:[],photoMemories:[]
}];

const uid = () => Math.random().toString(36).slice(2, 10);

// localStorage persistence
function loadRecipes() {
  try {
    const d = localStorage.getItem("pratt-cookbook-recipes");
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}
function saveRecipes(recipes) {
  try { localStorage.setItem("pratt-cookbook-recipes", JSON.stringify(recipes)); } catch(e) {}
}

function App() {
  const [recipes, setRecipes] = useState(() => loadRecipes() || SAMPLE_RECIPES);
  const [view, setView] = useState("grid");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [editingRecipe, setEditingRecipe] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [activeCategory, setActiveCategory] = useState("All Recipes");
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);

  useEffect(() => { saveRecipes(recipes); }, [recipes]);

  const toast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2500); };

  const filtered = recipes.filter(r => {
    const matchCat = activeCategory === "All Recipes" || r.category === activeCategory;
    const matchSearch = !searchTerm ||
      r.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(searchTerm.toLowerCase())) ||
      (r.addedBy && r.addedBy.toLowerCase().includes(searchTerm.toLowerCase()));
    return matchCat && matchSearch;
  });

  const openRecipe = r => { setSelectedRecipe(r); setView("detail"); };
  const openNewForm = () => { setEditingRecipe(null); setView("form"); };
  const openEditForm = r => { setEditingRecipe(r); setView("form"); };
  const backToGrid = () => { setView("grid"); setSelectedRecipe(null); setEditingRecipe(null); };

  const saveRecipe = (recipe) => {
    if (editingRecipe) {
      setRecipes(prev => prev.map(r => r.id === recipe.id ? recipe : r));
      toast("Recipe updated!");
    } else {
      setRecipes(prev => [...prev, { ...recipe, id: uid(), dateAdded: new Date().toISOString().slice(0,10) }]);
      toast("Recipe added to the cookbook!");
    }
    backToGrid();
  };

  const deleteRecipe = id => {
    setRecipes(prev => prev.filter(r => r.id !== id));
    setDeleteConfirm(null);
    toast("Recipe removed");
    backToGrid();
  };

  const handlePrint = () => {
    const r = selectedRecipe;
    const w = window.open("","_blank");
    if(!w) return;
    w.document.write(`<!DOCTYPE html><html><head><title>${r.title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Source Sans 3',sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#2a2118}h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:6px;color:#5c3d2e}.meta{color:#8b7355;font-size:14px;margin-bottom:20px;border-bottom:2px solid #e8dcc8;padding-bottom:12px}.desc{font-style:italic;color:#6b5744;margin-bottom:20px;font-size:15px}h2{font-family:'Playfair Display',serif;font-size:18px;color:#5c3d2e;margin:20px 0 10px}.ing{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:15px}.ing .amt{font-weight:600;text-align:right}ol{padding-left:20px}ol li{margin-bottom:8px;font-size:15px;line-height:1.6}.notes{background:#faf5ec;padding:16px;border-radius:8px;margin-top:20px;font-size:14px;border-left:3px solid #c9a96e}.footer{margin-top:30px;font-size:12px;color:#8b7355;text-align:center;border-top:1px solid #e8dcc8;padding-top:12px}</style></head><body>
    <h1>${r.title}</h1>
    <div class="meta">${r.category} · Serves ${r.servings} · Prep: ${r.prepTime} · Cook: ${r.cookTime}${r.addedBy ? ` · Added by ${r.addedBy}` : ""}</div>
    ${r.description ? `<div class="desc">${r.description}</div>` : ""}
    <h2>Ingredients</h2>
    <div class="ing">${r.ingredients.map(i => `<span class="amt">${i.amount} ${i.unit}</span><span>${i.name}</span>`).join("")}</div>
    <h2>Instructions</h2>
    <ol>${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
    ${r.notes ? `<div class="notes"><strong>Notes:</strong> ${r.notes}</div>` : ""}
    <div class="footer">From the Pratt Family Cookbook · ${r.dateAdded}</div>
    </body></html>`);
    w.document.close();
    w.print();
  };

  return (
    <div>
      {toastMsg && <div className="toast">{toastMsg}</div>}

      {view === "grid" && <GridView recipes={filtered} searchTerm={searchTerm} setSearchTerm={setSearchTerm}
        activeCategory={activeCategory} setActiveCategory={setActiveCategory}
        onOpen={openRecipe} onNew={openNewForm} totalCount={recipes.length} />}

      {view === "detail" && selectedRecipe && <DetailView recipe={selectedRecipe} onBack={backToGrid}
        onEdit={() => openEditForm(selectedRecipe)} onDelete={() => setDeleteConfirm(selectedRecipe.id)}
        onPrint={handlePrint}
        onUpdatePhotos={(photos, memories) => {
          const updated = { ...selectedRecipe, photos, photoMemories: memories };
          setRecipes(prev => prev.map(r => r.id === updated.id ? updated : r));
          setSelectedRecipe(updated);
        }} />}

      {view === "form" && <RecipeForm recipe={editingRecipe} onSave={saveRecipe} onCancel={backToGrid} />}

      {deleteConfirm && (
        <div className="modal-overlay" onClick={() => setDeleteConfirm(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Remove this recipe?</h3>
            <p>This can't be undone. The recipe will be permanently deleted from the family cookbook.</p>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setDeleteConfirm(null)}>Keep It</button>
              <button className="btn btn-danger" onClick={() => deleteRecipe(deleteConfirm)}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ GRID VIEW ═══ */
function GridView({ recipes, searchTerm, setSearchTerm, activeCategory, setActiveCategory, onOpen, onNew, totalCount }) {
  return (
    <div>
      <div className="header">
        <div className="header-inner">
          <div className="header-left">
            <div className="logo-mark">🍳</div>
            <div>
              <a href="https://mpratt1809.github.io/hub/" className="back-link">← PrattHub</a>
              <h1>Family Cookbook</h1>
              <p className="sub">{totalCount} recipe{totalCount !== 1 ? "s" : ""} and counting</p>
            </div>
          </div>
          <button className="btn btn-primary" onClick={onNew}>+ Add Recipe</button>
        </div>
      </div>

      <div className="controls">
        <div className="search-wrap">
          <span style={{color:"var(--tan)"}}>🔍</span>
          <input type="text" placeholder="Search recipes, ingredients, or family members..."
            value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
          {searchTerm && <button onClick={() => setSearchTerm("")} style={{background:"none",border:"none",cursor:"pointer",color:"var(--tan)",fontSize:18}}>✕</button>}
        </div>
        <div className="cat-row">
          {CATEGORIES.map(cat => (
            <button key={cat} className={`cat-btn ${activeCategory === cat ? "active" : ""}`}
              onClick={() => setActiveCategory(cat)}>{cat}</button>
          ))}
        </div>
      </div>

      <div className="grid">
        {recipes.length === 0 ? (
          <div className="empty-state">
            <div style={{fontSize:48}}>📖</div>
            <h3>No recipes found</h3>
            <p>{searchTerm ? "Try a different search term" : "Add your first family recipe to get started!"}</p>
          </div>
        ) : recipes.map((r, idx) => (
          <div key={r.id} className="card" onClick={() => onOpen(r)} style={{animationDelay:`${idx*0.06}s`}}>
            {r.photos && r.photos.length > 0 ? (
              <div className="card-img"><img src={r.photos[0]} alt="" /></div>
            ) : (
              <div className="card-img-placeholder">🍽️</div>
            )}
            <div className="card-body">
              <span className="card-cat">{r.category}</span>
              <h3 className="card-title">{r.title}</h3>
              <p className="card-desc">{r.description ? r.description.slice(0,80) + (r.description.length > 80 ? "..." : "") : "A family favorite"}</p>
              <div className="card-meta">
                <span>⏱ {r.prepTime || "—"}</span>
                <span>🍽 Serves {r.servings || "—"}</span>
                {r.addedBy && <span className="added-by-tag">by {r.addedBy}</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══ DETAIL VIEW ═══ */
function DetailView({ recipe: r, onBack, onEdit, onDelete, onPrint, onUpdatePhotos }) {
  const [showUpload, setShowUpload] = useState(false);
  const [caption, setCaption] = useState("");
  const fileRef = useRef();

  const addPhoto = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const newPhotos = [...(r.photos || []), ev.target.result];
      const newMem = [...(r.photoMemories || []), { caption: caption || "A delicious memory", date: new Date().toLocaleDateString() }];
      onUpdatePhotos(newPhotos, newMem);
      setCaption(""); setShowUpload(false);
    };
    reader.readAsDataURL(file);
  };

  const removePhoto = idx => {
    const newPhotos = (r.photos || []).filter((_, i) => i !== idx);
    const newMem = (r.photoMemories || []).filter((_, i) => i !== idx);
    onUpdatePhotos(newPhotos, newMem);
  };

  return (
    <div className="detail-wrap">
      <div className="detail-topbar">
        <button className="btn-icon" onClick={onBack}>← Back</button>
        <div style={{display:"flex",gap:6}}>
          <button className="btn-icon" onClick={onPrint} title="Print">🖨️</button>
          <button className="btn-icon" onClick={onEdit} title="Edit">✏️</button>
          <button className="btn-icon danger" onClick={onDelete} title="Delete">🗑️</button>
        </div>
      </div>

      <div style={{marginBottom:32}}>
        <span className="detail-cat">{r.category}</span>
        <h1 className="detail-title">{r.title}</h1>
        {r.description && <p className="detail-desc">{r.description}</p>}
        <div className="detail-meta">
          {r.prepTime && <span className="meta-chip">⏱ Prep: {r.prepTime}</span>}
          {r.cookTime && <span className="meta-chip">🔥 Cook: {r.cookTime}</span>}
          {r.servings && <span className="meta-chip">🍽 Serves {r.servings}</span>}
          {r.addedBy && <span className="meta-chip">❤️ by {r.addedBy}</span>}
        </div>
      </div>

      <div className="detail-columns">
        <div className="ingredient-panel">
          <h2 className="section-title">Ingredients</h2>
          {r.ingredients.map((ing, i) => (
            <div key={i} className="ing-row">
              <span className="ing-amount">{ing.amount} {ing.unit}</span>
              <span>{ing.name}</span>
            </div>
          ))}
        </div>
        <div>
          <h2 className="section-title">Instructions</h2>
          <div className="steps-list">
            {r.steps.map((step, i) => (
              <div key={i} className="step-item">
                <span className="step-num">{i + 1}</span>
                <span>{step}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {r.notes && <div className="notes-box"><strong style={{color:"var(--brown)"}}>Family Notes:</strong> {r.notes}</div>}

      {/* Photo Memories */}
      <div className="photos-section" style={{marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 className="section-title" style={{marginBottom:0}}>Memories</h2>
          <button className="btn btn-primary btn-sm" onClick={() => setShowUpload(!showUpload)}>📸 Add Photo</button>
        </div>

        {showUpload && (
          <div className="photo-upload-box">
            <input type="text" className="input" placeholder="Add a caption... (e.g. 'Thanksgiving 2024')"
              value={caption} onChange={e => setCaption(e.target.value)} style={{flex:1,maxWidth:350}} />
            <input ref={fileRef} type="file" accept="image/*" onChange={addPhoto} style={{display:"none"}} />
            <button className="btn btn-primary btn-sm" onClick={() => fileRef.current?.click()}>Choose Photo</button>
          </div>
        )}

        {r.photos && r.photos.length > 0 ? (
          <div className="photo-grid">
            {r.photos.map((p, i) => (
              <div key={i} className="photo-card" style={{position:"relative"}}>
                <img src={p} alt="" />
                <button className="photo-del" onClick={() => removePhoto(i)}>✕</button>
                <div className="photo-caption">
                  <span className="cap">{r.photoMemories?.[i]?.caption || "A tasty memory"}</span>
                  <span className="date">{r.photoMemories?.[i]?.date || ""}</span>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <p style={{color:"var(--tan)",fontStyle:"italic",fontSize:14,textAlign:"center",padding:24}}>
            No photos yet — snap a pic next time you make this!
          </p>
        )}
      </div>
    </div>
  );
}

/* ═══ RECIPE FORM ═══ */
function RecipeForm({ recipe, onSave, onCancel }) {
  const [form, setForm] = useState(recipe || {
    id:"",title:"",category:CATEGORIES[1],description:"",servings:4,prepTime:"",cookTime:"",
    ingredients:[{id:uid(),name:"",amount:"",unit:""}],
    steps:[""],notes:"",addedBy:"",customAddedBy:"",photos:[],photoMemories:[]
  });
  const [showCustom, setShowCustom] = useState(false);

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const addIng = () => set("ingredients",[...form.ingredients,{id:uid(),name:"",amount:"",unit:""}]);
  const rmIng = i => set("ingredients",form.ingredients.filter((_,idx) => idx !== i));
  const updIng = (i,f,v) => { const u=[...form.ingredients]; u[i]={...u[i],[f]:v}; set("ingredients",u); };

  const addStep = () => set("steps",[...form.steps,""]);
  const rmStep = i => set("steps",form.steps.filter((_,idx) => idx !== i));
  const updStep = (i,v) => { const u=[...form.steps]; u[i]=v; set("steps",u); };

  const submit = () => {
    if(!form.title.trim()) return;
    const finalBy = form.addedBy === "Custom" ? form.customAddedBy : form.addedBy;
    onSave({...form, addedBy: finalBy,
      ingredients: form.ingredients.filter(i => i.name.trim()),
      steps: form.steps.filter(s => s.trim())
    });
  };

  return (
    <div className="form-wrap">
      <div className="detail-topbar">
        <button className="btn-icon" onClick={onCancel}>← Cancel</button>
        <h2 style={{fontFamily:"var(--serif)",color:"var(--brown)",fontSize:20}}>{recipe ? "Edit Recipe" : "New Recipe"}</h2>
        <div style={{width:80}}></div>
      </div>

      <div className="form-body">
        <div className="form-group">
          <label className="label">Recipe Title *</label>
          <input className="input" value={form.title} onChange={e => set("title",e.target.value)} placeholder="e.g. Grandma's Famous Pot Roast" />
        </div>

        <div className="form-row">
          <div className="form-group">
            <label className="label">Category</label>
            <select className="select" value={form.category} onChange={e => set("category",e.target.value)}>
              {CATEGORIES.filter(c => c !== "All Recipes").map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="label">Added By</label>
            <select className="select" value={form.addedBy} onChange={e => {set("addedBy",e.target.value);setShowCustom(e.target.value==="Custom");}}>
              <option value="">Select member...</option>
              {FAMILY_MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            {showCustom && <input className="input" value={form.customAddedBy||""} onChange={e => set("customAddedBy",e.target.value)} placeholder="Enter name..." style={{marginTop:8}} />}
          </div>
        </div>

        <div className="form-group">
          <label className="label">Description</label>
          <textarea className="textarea" value={form.description} onChange={e => set("description",e.target.value)} placeholder="The story behind this recipe..." rows={3} />
        </div>

        <div className="form-row">
          <div className="form-group"><label className="label">Prep Time</label><input className="input" value={form.prepTime} onChange={e => set("prepTime",e.target.value)} placeholder="e.g. 15 min" /></div>
          <div className="form-group"><label className="label">Cook Time</label><input className="input" value={form.cookTime} onChange={e => set("cookTime",e.target.value)} placeholder="e.g. 45 min" /></div>
          <div className="form-group"><label className="label">Servings</label><input className="input" type="number" value={form.servings} onChange={e => set("servings",e.target.value)} /></div>
        </div>

        <div className="form-group">
          <label className="label">Ingredients</label>
          {form.ingredients.map((ing, i) => (
            <div key={ing.id||i} className="ing-form-row">
              <input className="input" value={ing.amount} onChange={e => updIng(i,"amount",e.target.value)} placeholder="Amt" />
              <select className="select" value={ing.unit} onChange={e => updIng(i,"unit",e.target.value)}>
                {UNITS.map(u => <option key={u} value={u}>{u||"—"}</option>)}
              </select>
              <input className="input" value={ing.name} onChange={e => updIng(i,"name",e.target.value)} placeholder="Ingredient name" />
              {form.ingredients.length > 1 && <button className="remove-btn" onClick={() => rmIng(i)}>✕</button>}
            </div>
          ))}
          <button className="add-row-btn" onClick={addIng}>+ Add Ingredient</button>
        </div>

        <div className="form-group">
          <label className="label">Instructions</label>
          {form.steps.map((step, i) => (
            <div key={i} className="step-form-row">
              <span className="step-form-num">{i+1}</span>
              <textarea className="textarea" value={step} onChange={e => updStep(i,e.target.value)} placeholder={`Step ${i+1}...`} rows={2} style={{flex:1}} />
              {form.steps.length > 1 && <button className="remove-btn" onClick={() => rmStep(i)}>✕</button>}
            </div>
          ))}
          <button className="add-row-btn" onClick={addStep}>+ Add Step</button>
        </div>

        <div className="form-group">
          <label className="label">Family Notes / Tips</label>
          <textarea className="textarea" value={form.notes} onChange={e => set("notes",e.target.value)} placeholder="Any special tips, substitutions, or stories..." rows={3} />
        </div>

        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:24}}>
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>{recipe ? "Save Changes" : "Add to Cookbook"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
