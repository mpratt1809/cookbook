<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookbook — PrattHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#10101a;--bg3:#141420;
  --card:#181824;--card2:#1e1e2e;--card-hover:#242438;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.12);
  --text:#e8e8ef;--text2:#c0c0d0;--text-dim:#6a6a82;--text-faint:#4a4a60;
  --pink:#ff8ca0;--pink-glow:rgba(255,140,160,0.12);--pink-soft:rgba(255,140,160,0.08);
  --blue:#63b4ff;--green:#82dc82;--orange:#ffaa64;--gold:#ffd175;
  --danger:#ff5c5c;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --radius:16px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 10%,rgba(255,140,160,0.03) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 90%,rgba(99,180,255,0.02) 0%,transparent 70%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink)!important;box-shadow:0 0 0 3px var(--pink-soft)}
::placeholder{color:var(--text-faint)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}

/* ── Header ── */
.header{background:linear-gradient(180deg,rgba(255,140,160,0.06) 0%,var(--bg) 100%);padding:24px 28px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:44px;height:44px;border-radius:14px;background:var(--pink-glow);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(255,140,160,0.15)}
.header-text .back-link{color:var(--text-dim);text-decoration:none;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:4px;transition:color 0.2s}
.header-text .back-link:hover{color:var(--pink)}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.header .sub{font-size:12px;color:var(--text-dim);margin-top:1px}

/* ── Buttons ── */
.btn{border:none;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:all 0.25s}
.btn-primary{background:var(--pink);color:#0a0a0f}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,140,160,0.3);filter:brightness(1.1)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--border3);background:var(--card2)}
.btn-danger{background:rgba(255,92,92,0.15);color:var(--danger);border:1px solid rgba(255,92,92,0.15)}
.btn-danger:hover{background:rgba(255,92,92,0.25)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-icon{background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:10px;display:flex;align-items:center;gap:6px;transition:all 0.2s;color:var(--text-dim);font-size:14px;font-weight:500;font-family:var(--font)}
.btn-icon:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.btn-icon.danger{color:var(--danger)}
.btn-icon.danger:hover{background:rgba(255,92,92,0.1)}

/* ── Controls ── */
.controls{max-width:1000px;margin:0 auto;padding:24px 28px 0}
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:12px 16px;border:1px solid var(--border)}
.search-wrap input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);font-family:var(--font)}
.search-clear{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:4px}
.cat-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.cat-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.cat-btn:hover{border-color:var(--border2);color:var(--text)}
.cat-btn.active{background:var(--pink);color:#0a0a0f;border-color:var(--pink);font-weight:700}

/* ── Grid ── */
.grid{max-width:1000px;margin:0 auto;padding:24px 28px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:all 0.3s;cursor:pointer;animation:fadeIn 0.4s ease both;position:relative}
.card::after{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;transition:opacity 0.3s;pointer-events:none;background:radial-gradient(circle at 50% 0%,var(--pink-soft),transparent 70%)}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4);border-color:rgba(255,140,160,0.12)}
.card:hover::after{opacity:1}
.card-img{height:160px;overflow:hidden;background:var(--bg2)}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img-placeholder{height:160px;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:36px}
.card-body{padding:16px 18px 18px;position:relative;z-index:1}
.card-cat{font-size:10px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:1.5px}
.card-title{font-size:17px;font-weight:700;color:var(--text);margin-top:6px;line-height:1.3;letter-spacing:-0.3px}
.card-desc{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}
.card-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:12px;color:var(--text-dim);align-items:center}
.added-by-tag{background:var(--pink-glow);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;color:var(--pink)}

/* ── Detail ── */
.detail-wrap{max-width:860px;margin:0 auto;padding:20px 28px 40px;animation:slideIn 0.3s ease both}
.detail-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.detail-cat{font-size:11px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:1.5px}
.detail-title{font-size:34px;font-weight:900;color:var(--text);margin-top:8px;line-height:1.1;letter-spacing:-1px}
.detail-desc{font-size:16px;color:var(--text-dim);font-style:italic;margin-top:10px;line-height:1.6}
.detail-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.meta-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card);border-radius:20px;font-size:13px;color:var(--text2);border:1px solid var(--border);font-weight:500}
.detail-columns{display:grid;grid-template-columns:1fr 1.5fr;gap:32px;margin:28px 0 24px}
@media(max-width:700px){.detail-columns{grid-template-columns:1fr}}
.ingredient-panel{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border)}
.section-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;letter-spacing:-0.3px}
.ing-row{display:flex;gap:12px;font-size:14px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.ing-amount{font-weight:700;color:var(--pink);min-width:75px;text-align:right}
.ing-name{color:var(--text2)}
.steps-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:16px}
.step-item{display:flex;gap:14px;font-size:15px;line-height:1.65;color:var(--text2)}
.step-num{min-width:30px;height:30px;border-radius:50%;background:var(--pink);color:#0a0a0f;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:2px}
.notes-box{background:var(--card);padding:20px;border-radius:var(--radius);border-left:3px solid var(--pink);font-size:14px;color:var(--text-dim);line-height:1.6;margin-bottom:24px}

/* ── Photos ── */
.photo-upload-box{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.photo-card{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--border);transition:transform 0.2s;position:relative}
.photo-card:hover{transform:scale(1.02)}
.photo-card img{width:100%;height:170px;object-fit:cover}
.photo-caption{padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.photo-caption .cap{font-size:13px;color:var(--text);font-weight:500}
.photo-caption .date{font-size:12px;color:var(--text-dim)}
.photo-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.photo-del:hover{background:rgba(255,92,92,0.6)}

/* ── Form ── */
.form-wrap{max-width:760px;margin:0 auto;padding:20px 28px 40px;animation:slideIn 0.3s ease both}
.form-body{background:var(--card);border-radius:20px;padding:28px;border:1px solid var(--border)}
.form-group{margin-bottom:20px}
.form-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.form-row .form-group{flex:1;min-width:140px;margin-bottom:0}
label.label{display:block;font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.input,.select,.textarea{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--border);font-size:14px;color:var(--text);font-family:var(--font);background:var(--bg2);transition:border-color 0.2s,box-shadow 0.2s}
.select{cursor:pointer;-webkit-appearance:auto;appearance:auto}
.textarea{resize:vertical}
.ing-form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.ing-form-row .input:first-child{width:70px;flex:none}
.ing-form-row .select{width:80px;flex:none}
.ing-form-row .input:last-of-type{flex:1}
.step-form-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.step-form-num{min-width:28px;height:28px;border-radius:50%;background:rgba(255,140,160,0.15);color:var(--pink);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:10px}
.add-row-btn{background:none;border:1px dashed rgba(255,140,160,0.3);border-radius:12px;padding:8px 16px;font-size:13px;color:var(--pink);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;margin-top:4px;font-family:var(--font);transition:all 0.2s}
.add-row-btn:hover{border-color:var(--pink);background:var(--pink-soft)}
.remove-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--danger);font-size:16px;line-height:1;transition:background 0.2s}
.remove-btn:hover{background:rgba(255,92,92,0.1)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card2);border-radius:20px;padding:28px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.5);border:1px solid var(--border2)}
.modal h3{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px}
.modal p{color:var(--text-dim);font-size:14px;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* ── GF Toggle & Badge ── */
.gf-toggle{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1px solid rgba(130,220,130,0.2);background:transparent;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.25s;white-space:nowrap}
.gf-toggle:hover{border-color:rgba(130,220,130,0.4);background:rgba(130,220,130,0.06)}
.gf-toggle.active{background:var(--green);color:#0a0a0f;border-color:var(--green)}
.gf-icon{font-weight:800;font-size:11px;letter-spacing:0.5px}
.gf-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:0.5px;background:rgba(130,220,130,0.15);color:var(--green);line-height:1}

/* ── Empty ── */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px}
.empty-state h3{font-size:20px;font-weight:700;color:var(--text);margin-top:16px}
.empty-state p{color:var(--text-dim);font-size:14px;margin-top:4px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--pink);color:#0a0a0f;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 8px 30px rgba(255,140,160,0.3);animation:toastIn 0.3s ease}

/* ── Responsive ── */
@media(max-width:600px){
  .header{padding:16px}.header h1{font-size:18px}
  .grid{grid-template-columns:1fr;padding:16px}
  .controls{padding:16px}
  .detail-title{font-size:26px}
  .form-body{padding:20px}
  .detail-wrap,.form-wrap{padding:12px 16px 32px}
}

@media print{
  .header,.controls,.detail-topbar,.photos-section,.no-print{display:none!important}
  body{background:#fff;color:#222}
  .detail-wrap{padding:0;max-width:100%}
  .card,.ingredient-panel,.notes-box{background:#f8f8f8;border-color:#ddd}
  .step-num{background:#333;color:#fff}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = ["All Recipes","Breakfast","Lunch","Dinner","Healthy Desserts","Desserts","Snacks","Sauces","Beverages — Alcoholic","Beverages — Non-Alcoholic"];
const UNITS = ["","tsp","tbsp","cup","oz","lb","g","kg","ml","L","pinch","dash","whole","slice","clove","can","bunch","pkg"];
const FAMILY_MEMBERS = ["Sky","Meagan","Grandma","Grandpa","Mom","Dad","Custom"];

const SAMPLE_RECIPES = [{
  id:"sample-1",title:"Grandma's Chocolate Chip Cookies",category:"Desserts",
  description:"The recipe that started it all. Crispy edges, chewy centers, and that secret touch of love only Grandma could add.",
  servings:36,prepTime:"15 min",cookTime:"12 min",
  ingredients:[
    {id:"i1",name:"all-purpose flour",amount:"2.25",unit:"cup"},
    {id:"i2",name:"butter, softened",amount:"1",unit:"cup"},
    {id:"i3",name:"granulated sugar",amount:"0.75",unit:"cup"},
    {id:"i4",name:"brown sugar, packed",amount:"0.75",unit:"cup"},
    {id:"i5",name:"eggs",amount:"2",unit:"whole"},
    {id:"i6",name:"vanilla extract",amount:"1",unit:"tsp"},
    {id:"i7",name:"baking soda",amount:"1",unit:"tsp"},
    {id:"i8",name:"salt",amount:"1",unit:"tsp"},
    {id:"i9",name:"chocolate chips",amount:"2",unit:"cup"},
  ],
  steps:[
    "Preheat oven to 375°F. Line baking sheets with parchment paper.",
    "Whisk together flour, baking soda, and salt in a bowl. Set aside.",
    "Beat butter and both sugars until light and fluffy, about 3 minutes.",
    "Beat in eggs one at a time, then add vanilla.",
    "Gradually mix in flour mixture until just combined.",
    "Fold in chocolate chips by hand — Grandma always said the spoon matters.",
    "Drop rounded tablespoons onto baking sheets, spacing 2 inches apart.",
    "Bake 9-12 minutes until golden brown. Let cool on pan for 5 minutes.",
  ],
  notes:"Grandma's secret: chill the dough for 30 minutes before baking for thicker cookies.",
  addedBy:"Grandma",dateAdded:"2024-01-15",glutenFree:false,photos:[],photoMemories:[]
}];

const uid = () => Math.random().toString(36).slice(2, 10);

function loadRecipes(){try{const d=localStorage.getItem("pratt-cookbook-recipes");return d?JSON.parse(d):null}catch(e){return null}}
function saveRecipes(r){try{localStorage.setItem("pratt-cookbook-recipes",JSON.stringify(r))}catch(e){}}

function App(){
  const [recipes,setRecipes]=useState(()=>loadRecipes()||SAMPLE_RECIPES);
  const [view,setView]=useState("grid");
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("All Recipes");
  const [delId,setDelId]=useState(null);
  const [toast,setToast]=useState(null);
  const [gfOnly,setGfOnly]=useState(false);

  useEffect(()=>{saveRecipes(recipes)},[recipes]);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2500)};

  const filtered=recipes.filter(r=>{
    const mc=cat==="All Recipes"||r.category===cat;
    const ms=!search||r.title.toLowerCase().includes(search.toLowerCase())||r.ingredients.some(i=>i.name.toLowerCase().includes(search.toLowerCase()))||(r.addedBy&&r.addedBy.toLowerCase().includes(search.toLowerCase()));
    const mg=!gfOnly||r.glutenFree;
    return mc&&ms&&mg;
  });

  const openR=r=>{setSelected(r);setView("detail")};
  const newR=()=>{setEditing(null);setView("form")};
  const editR=r=>{setEditing(r);setView("form")};
  const back=()=>{setView("grid");setSelected(null);setEditing(null)};

  const saveR=recipe=>{
    if(editing){setRecipes(p=>p.map(r=>r.id===recipe.id?recipe:r));showToast("Recipe updated!")}
    else{setRecipes(p=>[...p,{...recipe,id:uid(),dateAdded:new Date().toISOString().slice(0,10)}]);showToast("Recipe added!")}
    back();
  };
  const delR=id=>{setRecipes(p=>p.filter(r=>r.id!==id));setDelId(null);showToast("Recipe removed");back()};

  const printR=()=>{
    const r=selected;const w=window.open("","_blank");if(!w)return;
    w.document.write(`<!DOCTYPE html><html><head><title>${r.title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#222}h1{font-size:28px;font-weight:800;margin-bottom:6px}.meta{color:#888;font-size:13px;margin-bottom:20px;border-bottom:2px solid #eee;padding-bottom:12px}.desc{font-style:italic;color:#666;margin-bottom:20px;font-size:15px}h2{font-size:17px;font-weight:700;margin:20px 0 10px}.ing{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:14px}.ing .amt{font-weight:700;text-align:right;color:#ff6b81}ol{padding-left:20px}ol li{margin-bottom:8px;font-size:14px;line-height:1.6}.notes{background:#f8f8f8;padding:16px;border-radius:8px;margin-top:20px;font-size:13px;border-left:3px solid #ff8ca0}.footer{margin-top:30px;font-size:12px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:12px}</style></head><body>
    <h1>${r.title}</h1>
    <div class="meta">${r.category} · Serves ${r.servings} · Prep: ${r.prepTime} · Cook: ${r.cookTime}${r.addedBy?` · by ${r.addedBy}`:""}</div>
    ${r.description?`<div class="desc">${r.description}</div>`:""}
    <h2>Ingredients</h2><div class="ing">${r.ingredients.map(i=>`<span class="amt">${i.amount} ${i.unit}</span><span>${i.name}</span>`).join("")}</div>
    <h2>Instructions</h2><ol>${r.steps.map(s=>`<li>${s}</li>`).join("")}</ol>
    ${r.notes?`<div class="notes"><strong>Notes:</strong> ${r.notes}</div>`:""}
    <div class="footer">Pratt Family Cookbook · ${r.dateAdded}</div></body></html>`);
    w.document.close();w.print();
  };

  return(
    <div>
      {toast&&<div className="toast">{toast}</div>}
      {view==="grid"&&<GridView recipes={filtered} search={search} setSearch={setSearch} cat={cat} setCat={setCat} gfOnly={gfOnly} setGfOnly={setGfOnly} onOpen={openR} onNew={newR} total={recipes.length}/>}
      {view==="detail"&&selected&&<DetailView r={selected} onBack={back} onEdit={()=>editR(selected)} onDelete={()=>setDelId(selected.id)} onPrint={printR}
        onPhotos={(p,m)=>{const u={...selected,photos:p,photoMemories:m};setRecipes(prev=>prev.map(r=>r.id===u.id?u:r));setSelected(u)}}/>}
      {view==="form"&&<RecipeForm recipe={editing} onSave={saveR} onCancel={back}/>}
      {delId&&(
        <div className="modal-overlay" onClick={()=>setDelId(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>Remove this recipe?</h3>
            <p>This can't be undone. It'll be permanently deleted from the family cookbook.</p>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setDelId(null)}>Keep It</button>
              <button className="btn btn-danger" onClick={()=>delR(delId)}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ GRID ═══ */
function GridView({recipes,search,setSearch,cat,setCat,gfOnly,setGfOnly,onOpen,onNew,total}){
  return(
    <div>
      <div className="header">
        <div className="header-inner">
          <div className="header-left">
            <div className="logo-mark">🍳</div>
            <div className="header-text">
              <a href="https://mpratt1809.github.io/hub/" className="back-link">← PRATTHUB</a>
              <h1>Family Cookbook</h1>
              <p className="sub">{total} recipe{total!==1?"s":""} and counting</p>
            </div>
          </div>
          <button className="btn btn-primary" onClick={onNew}>+ Add Recipe</button>
        </div>
      </div>
      <div className="controls">
        <div className="search-wrap">
          <span style={{color:"var(--text-dim)"}}>🔍</span>
          <input type="text" placeholder="Search recipes, ingredients, or family members..." value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button className="search-clear" onClick={()=>setSearch("")}>✕</button>}
        </div>
        <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:8,marginTop:16}}>
          <div className="cat-row" style={{marginTop:0,flex:1}}>
            {CATEGORIES.map(c=><button key={c} className={`cat-btn${cat===c?" active":""}`} onClick={()=>setCat(c)}>{c}</button>)}
          </div>
          <button className={`gf-toggle${gfOnly?" active":""}`} onClick={()=>setGfOnly(!gfOnly)}>
            <span className="gf-icon">GF</span> Gluten Free
          </button>
        </div>
      </div>
      <div className="grid">
        {recipes.length===0?(
          <div className="empty-state">
            <div style={{fontSize:48}}>📖</div>
            <h3>No recipes found</h3>
            <p>{search||gfOnly?"Try adjusting your filters":"Add your first family recipe to get started!"}</p>
          </div>
        ):recipes.map((r,i)=>(
          <div key={r.id} className="card" onClick={()=>onOpen(r)} style={{animationDelay:`${i*0.06}s`}}>
            {r.photos&&r.photos.length>0?<div className="card-img"><img src={r.photos[0]} alt=""/></div>:<div className="card-img-placeholder">🍽️</div>}
            <div className="card-body">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="card-cat">{r.category}</span>
                {r.glutenFree&&<span className="gf-badge">GF</span>}
              </div>
              <h3 className="card-title">{r.title}</h3>
              <p className="card-desc">{r.description?r.description.slice(0,80)+(r.description.length>80?"...":""):"A family favorite"}</p>
              <div className="card-meta">
                <span>⏱ {r.prepTime||"—"}</span>
                <span>🍽 Serves {r.servings||"—"}</span>
                {r.addedBy&&<span className="added-by-tag">by {r.addedBy}</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══ DETAIL ═══ */
function DetailView({r,onBack,onEdit,onDelete,onPrint,onPhotos}){
  const [showUp,setShowUp]=useState(false);
  const [cap,setCap]=useState("");
  const ref=useRef();
  const addPhoto=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{onPhotos([...(r.photos||[]),ev.target.result],[...(r.photoMemories||[]),{caption:cap||"A delicious memory",date:new Date().toLocaleDateString()}]);setCap("");setShowUp(false)};rd.readAsDataURL(f)};
  const rmPhoto=i=>{onPhotos((r.photos||[]).filter((_,idx)=>idx!==i),(r.photoMemories||[]).filter((_,idx)=>idx!==i))};

  return(
    <div className="detail-wrap">
      <div className="detail-topbar">
        <button className="btn-icon" onClick={onBack}>← Back</button>
        <div style={{display:"flex",gap:4}}>
          <button className="btn-icon" onClick={onPrint} title="Print">🖨️</button>
          <button className="btn-icon" onClick={onEdit} title="Edit">✏️</button>
          <button className="btn-icon danger" onClick={onDelete} title="Delete">🗑️</button>
        </div>
      </div>
      <div style={{marginBottom:32}}>
        <span className="detail-cat">{r.category}{r.glutenFree&&<span className="gf-badge" style={{marginLeft:8,position:"relative",top:-1}}>GF</span>}</span>
        <h1 className="detail-title">{r.title}</h1>
        {r.description&&<p className="detail-desc">{r.description}</p>}
        <div className="detail-meta">
          {r.prepTime&&<span className="meta-chip">⏱ Prep: {r.prepTime}</span>}
          {r.cookTime&&<span className="meta-chip">🔥 Cook: {r.cookTime}</span>}
          {r.servings&&<span className="meta-chip">🍽 Serves {r.servings}</span>}
          {r.addedBy&&<span className="meta-chip">❤️ by {r.addedBy}</span>}
        </div>
      </div>
      <div className="detail-columns">
        <div className="ingredient-panel">
          <h2 className="section-title">Ingredients</h2>
          {r.ingredients.map((ing,i)=><div key={i} className="ing-row"><span className="ing-amount">{ing.amount} {ing.unit}</span><span className="ing-name">{ing.name}</span></div>)}
        </div>
        <div>
          <h2 className="section-title">Instructions</h2>
          <div className="steps-list">
            {r.steps.map((s,i)=><div key={i} className="step-item"><span className="step-num">{i+1}</span><span>{s}</span></div>)}
          </div>
        </div>
      </div>
      {r.notes&&<div className="notes-box"><strong style={{color:"var(--pink)"}}>Family Notes:</strong> {r.notes}</div>}
      <div style={{marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 className="section-title" style={{marginBottom:0}}>Memories</h2>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowUp(!showUp)}>📸 Add Photo</button>
        </div>
        {showUp&&<div className="photo-upload-box"><input type="text" className="input" placeholder="Caption... (e.g. 'Thanksgiving 2024')" value={cap} onChange={e=>setCap(e.target.value)} style={{flex:1,maxWidth:350}}/><input ref={ref} type="file" accept="image/*" onChange={addPhoto} style={{display:"none"}}/><button className="btn btn-primary btn-sm" onClick={()=>ref.current?.click()}>Choose Photo</button></div>}
        {r.photos&&r.photos.length>0?(
          <div className="photo-grid">{r.photos.map((p,i)=><div key={i} className="photo-card"><img src={p} alt=""/><button className="photo-del" onClick={()=>rmPhoto(i)}>✕</button><div className="photo-caption"><span className="cap">{r.photoMemories?.[i]?.caption||"A tasty memory"}</span><span className="date">{r.photoMemories?.[i]?.date||""}</span></div></div>)}</div>
        ):<p style={{color:"var(--text-dim)",fontStyle:"italic",fontSize:14,textAlign:"center",padding:24}}>No photos yet — snap a pic next time you make this!</p>}
      </div>
    </div>
  );
}

/* ═══ FORM ═══ */
function RecipeForm({recipe,onSave,onCancel}){
  const [form,setForm]=useState(recipe||{id:"",title:"",category:CATEGORIES[1],description:"",servings:4,prepTime:"",cookTime:"",glutenFree:false,ingredients:[{id:uid(),name:"",amount:"",unit:""}],steps:[""],notes:"",addedBy:"",customAddedBy:"",photos:[],photoMemories:[]});
  const [showC,setShowC]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addI=()=>set("ingredients",[...form.ingredients,{id:uid(),name:"",amount:"",unit:""}]);
  const rmI=i=>set("ingredients",form.ingredients.filter((_,x)=>x!==i));
  const upI=(i,f,v)=>{const u=[...form.ingredients];u[i]={...u[i],[f]:v};set("ingredients",u)};
  const addS=()=>set("steps",[...form.steps,""]);
  const rmS=i=>set("steps",form.steps.filter((_,x)=>x!==i));
  const upS=(i,v)=>{const u=[...form.steps];u[i]=v;set("steps",u)};
  const submit=()=>{if(!form.title.trim())return;const by=form.addedBy==="Custom"?form.customAddedBy:form.addedBy;onSave({...form,addedBy:by,ingredients:form.ingredients.filter(i=>i.name.trim()),steps:form.steps.filter(s=>s.trim())})};

  return(
    <div className="form-wrap">
      <div className="detail-topbar">
        <button className="btn-icon" onClick={onCancel}>← Cancel</button>
        <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)"}}>{recipe?"Edit Recipe":"New Recipe"}</h2>
        <div style={{width:80}}></div>
      </div>
      <div className="form-body">
        <div className="form-group"><label className="label">Recipe Title *</label><input className="input" value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. Grandma's Famous Pot Roast"/></div>
        <div className="form-row">
          <div className="form-group"><label className="label">Category</label><select className="select" value={form.category} onChange={e=>set("category",e.target.value)}>{CATEGORIES.filter(c=>c!=="All Recipes").map(c=><option key={c} value={c}>{c}</option>)}</select></div>
          <div className="form-group"><label className="label">Added By</label><select className="select" value={form.addedBy} onChange={e=>{set("addedBy",e.target.value);setShowC(e.target.value==="Custom")}}><option value="">Select member...</option>{FAMILY_MEMBERS.map(m=><option key={m} value={m}>{m}</option>)}</select>{showC&&<input className="input" value={form.customAddedBy||""} onChange={e=>set("customAddedBy",e.target.value)} placeholder="Enter name..." style={{marginTop:8}}/>}</div>
        </div>
        <div className="form-group"><label className="label">Description</label><textarea className="textarea" value={form.description} onChange={e=>set("description",e.target.value)} placeholder="The story behind this recipe..." rows={3}/></div>
        <div className="form-row">
          <div className="form-group"><label className="label">Prep Time</label><input className="input" value={form.prepTime} onChange={e=>set("prepTime",e.target.value)} placeholder="e.g. 15 min"/></div>
          <div className="form-group"><label className="label">Cook Time</label><input className="input" value={form.cookTime} onChange={e=>set("cookTime",e.target.value)} placeholder="e.g. 45 min"/></div>
          <div className="form-group"><label className="label">Servings</label><input className="input" type="number" value={form.servings} onChange={e=>set("servings",e.target.value)}/></div>
        </div>
        <div className="form-group">
          <label className="label">Dietary</label>
          <button type="button" className={`gf-toggle${form.glutenFree?" active":""}`} onClick={()=>set("glutenFree",!form.glutenFree)} style={{marginTop:2}}>
            <span className="gf-icon">GF</span> Gluten Free {form.glutenFree?"✓":""}
          </button>
        </div>
        <div className="form-group">
          <label className="label">Ingredients</label>
          {form.ingredients.map((ing,i)=><div key={ing.id||i} className="ing-form-row"><input className="input" value={ing.amount} onChange={e=>upI(i,"amount",e.target.value)} placeholder="Amt"/><select className="select" value={ing.unit} onChange={e=>upI(i,"unit",e.target.value)}>{UNITS.map(u=><option key={u} value={u}>{u||"—"}</option>)}</select><input className="input" value={ing.name} onChange={e=>upI(i,"name",e.target.value)} placeholder="Ingredient name"/>{form.ingredients.length>1&&<button className="remove-btn" onClick={()=>rmI(i)}>✕</button>}</div>)}
          <button className="add-row-btn" onClick={addI}>+ Add Ingredient</button>
        </div>
        <div className="form-group">
          <label className="label">Instructions</label>
          {form.steps.map((s,i)=><div key={i} className="step-form-row"><span className="step-form-num">{i+1}</span><textarea className="textarea" value={s} onChange={e=>upS(i,e.target.value)} placeholder={`Step ${i+1}...`} rows={2} style={{flex:1}}/>{form.steps.length>1&&<button className="remove-btn" onClick={()=>rmS(i)}>✕</button>}</div>)}
          <button className="add-row-btn" onClick={addS}>+ Add Step</button>
        </div>
        <div className="form-group"><label className="label">Family Notes / Tips</label><textarea className="textarea" value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Any special tips, substitutions, or stories..." rows={3}/></div>
        <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:24}}>
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>{recipe?"Save Changes":"Add to Cookbook"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
